headline: "I've been reading the market since I was ten."
subhead: "Real account, real money, real consequences from the start. The losses taught me more than the wins."

body:
  - "My family opened a brokerage account for me when I was ten, and that's where it started. A few years later, my grandpa recommended I read The Changing World Order by Ray Dalio. Dalio breaks down centuries of history into repeating cycles of debt, power, and conflict, and once I saw that pattern, I couldn't unsee it. I started looking for cause and effect everywhere."
  - "That's the foundation of my whole philosophy: markets aren't random, they're systems, and systems repeat. I started reading 10-Ks and earnings transcripts before I understood half the numbers, because that's where the real signal is, not in headlines. My framework starts with the macro and works down. Where are we in the debt cycle? What are the geopolitical pressures? Which sectors are structurally positioned to benefit, not because of a headline, but because of the forces driving it? Sector positioning comes second, individual names come last."
  - "When U.S.-Iran tensions escalated, I worked through that framework end to end: macro pressure first, then which sectors stood to benefit, and I landed on cybersecurity. I picked up PANW and CRWD before it became the obvious trade, held through the volatility, and the thesis paid off. Not luck. A process, executed."
  - "People treat index funds like the boring part of a portfolio, the thing you put money into when you don't have a better idea. I think that's backwards. SPY and RSP are the foundation everything else sits on top of, RSP especially, because it equal-weights the S&P 500 instead of letting a handful of mega-caps decide the whole return. QQQ gives me exposure to the companies actually building and funding the AI infrastructure everyone's talking about, the labs and the hardware behind them. SCHD is the slow compounder, dividend-paying, quality companies, sitting on DRIP so it reinvests itself without me touching it. Most of the money that moves through markets every day moves through funds like these, not through people picking individual names, and once you understand that, you start to see the market less as a casino and more as a machine with predictable plumbing."
  - "The individual names are where I take the conviction I've built from following the macro and sector trends. Cybersecurity (PANW, CRWD) came from working through U.S.-Iran tensions and figuring out who benefits when geopolitical risk rises. Energy and infrastructure (CVX, KMI) are there because I think energy security stays relevant no matter what administration is in power. The rest are smaller positions where I'm either learning a new sector, betting on a specific catalyst, or just tracking a company I think is mispriced, some of these are small enough that they're really just tuition, a way to learn what it feels like to be wrong or right with real money on the line."

# Holdings - shown as a linked grid with hover detail (links to live TradingView quote)
holdings:
  - symbol: "SPY"
    exchange: "AMEX"
    blurb: "SPY was my first real position, the broadest, simplest way to own the U.S. stock market. I bought it because before I had a framework for picking individual names, owning the market itself was the smartest default. I'm holding it as the core everything else gets layered around."
  - symbol: "RSP"
    exchange: "AMEX"
    blurb: "RSP takes the S&P 500 and equal-weights it, so the 500th company matters as much as the largest one. I bought it because SPY on its own is increasingly just a handful of mega-cap tech stocks, and I wanted real diversification, not concentration dressed up as diversification. I'm holding it as the counterbalance to how top-heavy the market's gotten."
  - symbol: "QQQ"
    exchange: "NASDAQ"
    blurb: "QQQ gives me exposure to the Nasdaq 100, the companies actually building and funding the AI infrastructure everyone's racing toward, the hardware, the cloud platforms, the capital behind labs like Anthropic. I bought it as my growth and tech core, one trade instead of trying to pick which mega-cap wins. I'm holding it because I don't think you need to guess the single AI winner if you own the ecosystem around all of them."
  - symbol: "SCHD"
    exchange: "AMEX"
    blurb: "SCHD is the quiet compounder in my portfolio, a basket of quality, dividend-paying companies on DRIP so every payout buys more shares automatically. I bought it to build a long-term income stream I don't have to think about. I'm holding it because patience is part of my strategy, not everything needs to be an active decision."
  - symbol: "PANW"
    exchange: "NASDAQ"
    blurb: "PANW was the first leg of my cybersecurity thesis, the name I landed on after working through which sectors benefit when geopolitical tensions rise. I bought it because they're consolidating a lot of point security products into one platform, exactly where enterprise security spending is heading. I'm holding through the pullbacks because the long-term demand driver, more attack surface, more cyber risk, isn't going away."
  - symbol: "CRWD"
    exchange: "NASDAQ"
    blurb: "CrowdStrike was the second leg of my cybersecurity thesis alongside PANW, cloud-native endpoint protection that's become the standard for a lot of enterprises. I bought it when I worked through who benefits as cyber threats escalate with geopolitical tension. I held through the volatility after their outage because the core business and customer relationships didn't actually change."
  - symbol: "CVX"
    exchange: "NYSE"
    blurb: "Chevron is my energy anchor, an integrated major with a balance sheet strong enough to keep paying and raising its dividend through oil price swings. I bought it as a hedge, when inflation or energy prices spike, this is one of the few things in my portfolio that benefits instead of getting hurt. I'm holding it for that ballast as much as for the dividend."
  - symbol: "KMI"
    exchange: "NYSE"
    blurb: "Kinder Morgan owns the pipelines that move natural gas around the country, infrastructure that doesn't care much what oil prices do day to day. I bought a larger position here for steady income and because energy infrastructure felt like an underappreciated piece of the energy security story. I'm holding it as a slow, dividend-paying piece of the portfolio."
  - symbol: "AAPL"
    exchange: "NASDAQ"
    blurb: "Apple's the easiest business in my portfolio to explain: people don't switch out of the ecosystem once they're in it. I bought in because the services side, App Store, subscriptions, has been quietly growing into the most profitable part of the company. I'm holding because even when the stock dips on iPhone sales worries, the cash flow underneath barely moves."
  - symbol: "AMZN"
    exchange: "NASDAQ"
    blurb: "AWS is the part of Amazon most people forget about when they think of it as just a retail company, and it's the part that prints money. I bought Amazon for that cloud business and the ad revenue stacked on top of it. I'm holding because retail margins are improving too, so now there are two good reasons instead of one."
  - symbol: "GOOG"
    exchange: "NASDAQ"
    blurb: "Google is still the default way most of the world searches for information, and that hasn't changed even with all the AI disruption talk. I bought it because Search plus Cloud plus their own AI work gives them multiple ways to win. I'm holding because the market keeps underestimating how much optionality they actually have."
  - symbol: "ARM"
    exchange: "NASDAQ"
    blurb: "Arm doesn't make chips, it licenses the architecture that almost every mobile and increasingly AI chip is built on. I bought it because that royalty-style model means they get paid no matter who wins the chip race. It's a bet on the picks-and-shovels side of AI rather than any single chipmaker."
  - symbol: "TDY"
    exchange: "NYSE"
    blurb: "Teledyne makes the sensors and instrumentation that show up in aerospace, defense, and industrial applications most people never think about. I bought it because it's a high-quality compounder in a space with real barriers to entry, this isn't a company that gets disrupted overnight. I'm holding it as one of the steadier, higher-conviction names in the portfolio."
  - symbol: "TTWO"
    exchange: "NASDAQ"
    blurb: "Take-Two owns Rockstar Games, which means they own the GTA franchise, and a new GTA release is one of the biggest catalysts in all of gaming. I bought it ahead of that cycle because the upside from a release like that is hard to replicate anywhere else. I'm holding through the wait because the catalyst hasn't even happened yet."
  - symbol: "DIS"
    exchange: "NYSE"
    blurb: "Disney's a bet on content and IP being worth more over a long horizon than the market gives it credit for during any given rough quarter. I bought it during a period when streaming losses were dragging the stock down, parks and the IP library are too valuable for that to last forever. I'm holding to see the streaming business actually turn the corner to profitability."
  - symbol: "WMT"
    exchange: "NYSE"
    blurb: "Walmart is about as defensive as a stock gets, people keep buying groceries and essentials no matter what the economy is doing. I bought it as ballast, something that holds up when the riskier names in my portfolio don't. I'm holding it because that stability is valuable on its own, not despite being boring."
  - symbol: "C"
    exchange: "NYSE"
    blurb: "Citi's been a turnaround story for years, trading below book value while management restructures the bank. I bought it as a value play, the market was pricing in a lot of pessimism that I didn't think was fully justified. I'm holding to see if the restructuring actually closes that gap."
  - symbol: "PKOH"
    exchange: "NASDAQ"
    blurb: "Park-Ohio is a small industrial conglomerate, the kind of unglamorous manufacturing business that rarely shows up on anyone's radar. I bought a decent-sized position because it was trading cheap relative to its industrial segments. It's a value bet on a business that just needs the market to notice it."
  - symbol: "ACHR"
    exchange: "NYSE"
    blurb: "This is my bet on urban air mobility actually becoming a real industry, not just a concept. Archer's one of the furthest along in getting an electric air taxi certified and flying commercially. It's a small, high-risk position, I bought it knowing it could go to zero, but if it works the upside is enormous."
  - symbol: "GASS"
    exchange: "NASDAQ"
    blurb: "StealthGas is a small shipping company that transports LPG, a niche corner of the market most people never look at. I bought a larger share count at a low price because it was cheap relative to the cash it throws off. It's a small position, more of a value and income experiment in a sector I wanted to learn about."
  - symbol: "NMTC"
    exchange: "NASDAQ"
    blurb: "This one's a smaller, more speculative position, the kind of name where I'm still building conviction and treating it as a learning position. I bought a meaningful share count at a very low price because the risk per share was small even if I was wrong. I'm holding it to see whether the thesis develops, and if not, it's a cheap lesson."

# Career anchor
career_note: "The goal: break into asset management as a data analyst, then work my way toward managing a fund. Every step is about building the foundation, skills, judgment, and a track record that speaks for itself."


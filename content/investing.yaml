headline: "I've been reading the market since I was ten."
subhead: "Real account, real money, real consequences from the start. The losses taught me more than the wins."

body:
  - "I came to investing early — my grandparents opened a brokerage account for me, my grandfather pointed me toward Ray Dalio, and family connections in finance gave me a context most people don't get at ten years old. What I did with it was up to me. I started reading earnings transcripts and 10-Ks before I understood what half the numbers meant. That's the part most people skip, and I think it's why most people underperform."
  - "Over time I developed a framework that starts with the macro and works down. Where are we in the debt cycle? What are the geopolitical pressures? Which sectors are structurally positioned to benefit — not because of a headline, but because of the underlying forces driving it? That top-down lens is what I used to build the PANW and CRWD position before cybersecurity became the obvious trade. By the time it was obvious, I was already in."
  - "What draws me most is the interconnection — the way a geopolitical shift ripples through supply chains into earnings, the way narrative and reality drift apart and then violently realign, the way the same psychological patterns repeat across every market cycle. It's not random. It's a system. And systems can be understood."

# Philosophy bullets — shown as a styled list
philosophy:
  - "Process over prediction — a repeatable framework compounds better than occasional brilliance"
  - "Understand before you buy — if you can't explain the thesis simply, you don't own it yet"
  - "Macro context first. Sector positioning second. Individual names last."
  - "The long view earns the right to have opinions about the short view"

# Career anchor
career_note: "The goal: BlackRock internship → data analyst → fund manager. Every step is about building the foundation — skills, judgment, and a track record that speaks for itself."


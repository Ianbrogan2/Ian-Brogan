headline: "I've been reading the market since I was ten."
subhead: "Real account, real money, real consequences from the start. The losses taught me more than the wins."

body:
  - "My grandpa recommended I read The Changing World Order by Ray Dalio when I was ten, around the same time my family opened a brokerage account for me. That book is where it started. Dalio breaks down centuries of history into repeating cycles of debt, power, and conflict, and once I saw that pattern, I couldn't unsee it. I started looking for cause and effect everywhere."
  - "That's the foundation of my whole philosophy: markets aren't random, they're systems, and systems repeat. I started reading 10-Ks and earnings transcripts before I understood half the numbers, because that's where the real signal is, not in headlines. My framework starts with the macro and works down. Where are we in the debt cycle? What are the geopolitical pressures? Which sectors are structurally positioned to benefit, not because of a headline, but because of the forces driving it? Sector positioning comes second, individual names come last."
  - "When U.S.-Iran tensions escalated, I worked through that framework end to end: macro pressure first, then which sectors stood to benefit, and I landed on cybersecurity. I picked up PANW and CRWD before it became the obvious trade, held through the volatility, and the thesis paid off. Not luck. A process, executed."
  - "I also run a long-term dividend portfolio with DRIP. It compounds quietly in the background while I stay focused on everything else, a reminder that patience is part of the strategy too. Seven years in, the most valuable thing I've built isn't the portfolio. It's the ability to see what's coming before it's obvious to everyone else."

# Philosophy bullets — shown as a styled list
philosophy:
  - "Process over prediction: a repeatable framework compounds better than occasional brilliance"
  - "Understand before you buy: if you can't explain the thesis simply, you don't own it yet"
  - "Macro context first. Sector positioning second. Individual names last."
  - "The long view earns the right to have opinions about the short view"


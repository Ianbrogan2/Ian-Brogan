# Community service, framed by impact and concentration
service:
  headline: "130+ service hours, 100 of them on one program"
  items:
    - hours: "100 hours"
      role: "ENN Studios rebuild"
      description: "Most of my service went into rebuilding the broadcast program: graphics, systems, and an identity the next class inherits."
    - hours: "30 hours"
      role: "Elementary school, a return to roots"
      description: "Volunteered back at my old elementary school, the same place my Dual Language Immersion path began. The 30 hours cleared the requirement; the program work is where I went well past it."

closing: "None of this happened in a straight line, and that is the point. A club I helped lead as a freshman, a medical year I refused to lose, and a studio I now run as a senior are all the same thread: showing up, even when the year does not go the way you planned."

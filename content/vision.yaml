# ============================================================
# VISION / GOALS — target schools, career roadmap, endgame
# ============================================================

headline: "The roadmap is long. That's the point."
subhead: "I'm not looking for a job. I'm building toward something specific — and every step between now and there has a purpose."

# Target schools for college
schools:
  headline: "Where I'm applying"
  items:
    - name: "Cal Poly SLO"
      program: "Business Economics + Data Analytics"
      note: "Strong applied-learning culture. You build things here, you don't just study them."
    - name: "UC Davis"
      program: "Business Economics + Viticulture & Enology minor"
      note: "The only school where the finance track and the vineyard track live in the same building."
    - name: "UC Berkeley"
      program: "Business / Haas + Data Analytics"
      note: "Haas is one of the best direct pipelines into finance in the country. The ceiling is worth shooting for."

# Career arc — shown as a styled timeline
career_arc:
  headline: "The arc"
  stages:
    - phase: "Near term"
      label: "College"
      detail: "Business Economics major with a Data Analytics focus. A Viticulture & Enology or Film/Production minor if the schedule allows — both are part of the larger picture."
    - phase: "Early career"
      label: "BlackRock internship"
      detail: "I have a family connection that opens the door. What I bring through it is seven years of self-directed market study, a real portfolio, and a framework I've actually tested."
    - phase: "Building"
      label: "Data analyst → senior analyst"
      detail: "Learn how institutional capital moves at scale. Build the quantitative depth and pattern recognition that fund management actually requires — not just the title."
    - phase: "The goal"
      label: "Fund manager"
      detail: "Capital allocation at scale, with full conviction behind every position. That's the thing I've been working toward since I was ten years old."
    - phase: "The endgame"
      label: "The vineyard"
      detail: "Where the two worlds finally meet. The same patience it takes to hold a position through volatility is the patience it takes to wait for a vintage. I want to build something that outlasts a career."

# Closing line
closing: "The vineyard isn't a retirement plan. It's the proof that you built something worth slowing down for."

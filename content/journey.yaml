# ============================================================
# JOURNEY — stock-market life graph data
# This file drives the SVG life-timeline graph on the home page.
#
# HOW TO EDIT:
#   - "milestones" are labeled points shown on the chart with detail cards
#   - "noise_points" are unlabeled volatility points that make the line feel real
#   - "age" is a decimal number (e.g. 13.5 = age thirteen and a half)
#   - "value" is a growth index (starts ~100, rises over time — adjust freely)
#   - "present_age" marks where the solid past line ends and the dashed future begins
#
# DO NOT EDIT BELOW the "# --- chart rendering ---" comment
# ============================================================

present_age: 17.5

milestones:
  - age: 10
    value: 100
    label: "First investment account"
    description: "My family opened a brokerage account for me and pointed me toward the right books. They had the background, I had the drive. I ran with it."
    type: "past"

  - age: 13.5
    value: 115
    label: "Independent study year"
    description: "A medical pivot, not a setback. It became a launchpad for self-teaching design, 3D printing, and craft."
    type: "past"

  - age: 14.5
    value: 175
    label: "ADHD as the engine"
    description: "Reframed the diagnosis. The range, the intensity, the ability to move between worlds. That's the feature."
    type: "past"

  - age: 15.5
    value: 265
    label: "Design, 3D printing & making"
    description: "Built a resin table. Designed and vinyl-wrapped a custom 3D-printed spoiler shelf. Mastered the full Adobe suite, all self-directed."
    type: "past"

  - age: 16.5
    value: 355
    label: "Lead Studio Director"
    description: "Promoted to lead director for the school's TV & Film and Digital Media program."
    type: "past"

  - age: 17
    value: 430
    label: "CTE program revamp"
    description: "Entrusted with a six-figure budget to overhaul a CTE program launching summer 2026."
    type: "past"

  - age: 17.5
    value: 465
    label: "Present, Summer 2026"
    description: "Building toward college, compounding every skill."
    type: "current"

  - age: 18.5
    value: 520
    label: "College"
    description: "Business Economics + Data Analytics. Cal Poly SLO, UC Davis, or UC Berkeley, the gateway to everything next."
    type: "future"

  - age: 20
    value: 620
    label: "BlackRock internship"
    description: "I have a family connection that opens the door. What I bring through it is seven years of real market study, an active portfolio, and a framework I've actually tested."
    type: "future"

  - age: 23
    value: 810
    label: "Junior data analyst"
    description: "First real career chapter. Data-driven decisions at an institutional level."
    type: "future"

  - age: 27
    value: 1080
    label: "Senior data analyst"
    description: "Building the expertise and the track record."
    type: "future"

  - age: 32
    value: 1550
    label: "Fund manager"
    description: "The long goal. Mastery over capital allocation, not just analysis."
    type: "future"

  - age: 42
    value: 2400
    label: "Compound wealth & mastery"
    description: "Decades of compounding: financial, intellectual, personal."
    type: "future"

  - age: 55
    value: 3000
    label: "Retire to the vineyard"
    description: "Where the two worlds finally merge. Precision in the growing season. Patience in the aging barrel."
    type: "future"


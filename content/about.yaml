headline: "My name is Ian Brogan."
subhead: "Seventeen years old, curious about almost everything, and happiest when I'm in the middle of building something."

# Each paragraph is its own block. Keep them short; they breathe better.
body:
  - "I have ADHD, and for most of my life that's been the engine behind everything I do. My free time isn't spent being lazy, it's spent learning. If something interests me, I go all in on it until I understand how it actually works."
  - "That's led me down a lot of different paths: markets and finance, film and production, graphics, building things in resin, woodworking, crochet, CAD, and cooking at a professional level. People sometimes assume that's scattered. It's not. It's just how my brain works, and I've learned to use it instead of fighting it."
  - "My family has been a huge part of all of it. They're the reason I got my start in markets at ten, and they've supported every random rabbit hole since, whether that was a new hobby, a business idea, or a skill I decided I needed to learn that week."
  - "That drive carries over into school too. I'm President of ENN Studios, our school's broadcast program, after starting as Vice President of the Dual Language Immersion Club my freshman year. Between leading ENN's rebrand and helping out at my old elementary school, I've put in well over a hundred hours of community service, and I've kept a 4.22 weighted GPA along the way, which earned me the Golden State Seal Merit Diploma."
  - "Outside of school I've got a smaller circle that matters just as much: golf and skiing when I get the chance, fishing with my cousin, family trips through wine country, and Friday nights at Ohr Shalom Synagogue."
  - "This site is a journal of all of it: who I am, what I've built, and where I'm headed. If you want the deep dive on how I think about markets specifically, that's the investing page. This page is everything else, the full picture of me."


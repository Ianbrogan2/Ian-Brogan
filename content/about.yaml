headline: "My name is Ian Brogan."
subhead: "My family put me onto markets at ten. That was the spark. Everything since has been me running with it."

# Each paragraph is its own block. Keep them short; they breathe better.
body:
  - "When I was ten, my family opened a brokerage account for me and pointed me toward the right books, starting with Ray Dalio's The Changing World Order. I read it straight through, then Principles, then everything I could get my hands on: 10-Ks, earnings calls, financial statements. Markets became the thing I kept coming back to."
  - "What grabbed me wasn't the money. It was the patterns. The same debt cycles, power shifts, and market crashes keep playing out across centuries with different names. Once I saw that, I stopped reacting to headlines and started studying cause. Macro context first, then sector dynamics, then individual names."
  - "That framework has held up in real markets. When U.S.-Iran tensions escalated, I worked through which sectors stood to benefit and landed on cybersecurity: PANW and CRWD specifically. I held through the volatility, and the thesis paid off. Not luck. A process, executed."
  - "I also run a long-term dividend portfolio with DRIP, it compounds quietly while I stay focused on everything else. Seven years in, the most valuable thing I've built isn't the portfolio. It's the ability to see what's coming before it's obvious to everyone else."

# The duality callout — shown as a visual pull-quote
duality_quote: "The edge is seeing the pattern before it's obvious to everyone else."


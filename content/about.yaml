headline: "Hello, my name is Ian Brogan."
subhead: "Since I can remember, I've been obsessed with learning new skills — crochet, woodworking, 3D design, CAD. Then a brokerage account changed everything."

# Each paragraph is its own block. Keep them short; they breathe better.
body:
  - "On my 10th birthday, my aunts and grandparents opened a brokerage account for me with an initial $1,000 investment. I became obsessed. I studied everything — financial statements, earnings reports, company news — religiously. My grandfather handed me a book recommendation that changed the way I see the world: Ray Dalio's The Changing World Order. I read it cover to cover. Then I read Principles as well."
  - "What hooked me was the patterns. Everything in history repeats. Debt cycles, power shifts, market crashes, recoveries — the same forces play out over and over again. Once I understood that, I stopped reacting to headlines and started studying causation. I learned to use macroeconomic patterns and deep financial data together to inform every investment decision I make."
  - "A concrete example: when the Iran-US conflict began escalating, I didn't panic. I did a deep dive into sectors that would benefit — renewable energy, infrastructure, and most importantly, cybersecurity. I analyzed a number of cybersecurity companies and landed on two: PANW and CRWD. I made the investment. By the time the conflict wound down, I had gained over 30% on the position."
  - "I also built several mock fund portfolios in my own time, and I currently hold a long-term dividend portfolio with DRIP enabled — it compounds quietly in the background. Over seven years, through patience and pattern recognition, I turned that original $1,000 into over $25,000. The most important thing I've learned: patterns are everything. The ability to identify them is a genuine edge."

# The duality callout — shown as a visual pull-quote
duality_quote: "Patterns repeat. The edge is learning to see them first."

